log-level: info
display-ip: "10.10.250.1"    # shared display IP in web runtime info (IPSC + Hytera)

ipsc:
  enabled: true
  port: 50005               # moto IPSC port
  auth:
    enabled: false
    key: ""

hytera:
  enabled: true
  p2p-port: 50000
  dmr-port: 50001
  rdac-port: 50002
  enable-rdac: false

metrics:
  enabled: false
  address: ":9100"

dmrid-db:
  path: "dmrid.csv"

storage:
  path: "ipsc2mmdvm.db"

web:
  enabled: true
  address: ":9201"
  session-secret: "change-me"
  bootstrap-admin:
    username: "admin"
    callsign: "N0ADM"
    email: "admin@example.com"
    password: "change-me-now"

local:
  id: 9000000
  callsign: "IPSC2MMDVM"
  color-code: 1

# Optional bootstrap import only.
# On first start, entries here are imported into SQLite if the database
# does not already contain any managed MMDVM upstream devices.
# After that, maintain MMDVM upstreams from the Web UI instead.
mmdvm-client:
  - name: "BrandMeister"
    master-server: "3104.master.brandmeister.network:62031"
    password: "passw0rd"

    callsign: N0CALL
    radio-id: 185925701

    # Frequency in Hz:
    rx-freq: 429075000
    tx-freq: 424075000

    # TX power in dBm (optional):
    # tx-power: 30

    color-code: 7
    # Optional latitude and longitude:
    # latitude: 30.000000
    # longitude: -97.000000

    # Height in meters:
    height: 3

    # Optional location:
    location: "Moore, OK"

    # Optional description:
    # description: ""

    # Optional URL:
    # url: ""

    # DMRGateway-style rewrite rules (optional).
    # Each rule has: from-slot, from-tg/id, to-slot, to-tg/id, range.
    # TGRewrite: rewrite group talkgroup calls
    # tg-rewrite:
    #   - from-slot: 1
    #     from-tg: 9
    #     to-slot: 1
    #     to-tg: 9
    #     range: 1
    # PCRewrite: rewrite private calls by destination ID
    # pc-rewrite:
    #   - from-slot: 1
    #     from-id: 100
    #     to-slot: 1
    #     to-id: 200
    #     range: 1
    # TypeRewrite: convert group TG calls to private calls
    # type-rewrite:
    #   - from-slot: 1
    #     from-tg: 9
    #     to-slot: 1
    #     to-id: 3100
    #     range: 1
    # SrcRewrite: match calls by source ID, remap source into a prefixed range
    # src-rewrite:
    #   - from-slot: 1
    #     from-id: 1234
    #     to-slot: 1
    #     to-id: 9
    #     range: 1

  # Additional DMR masters can be added:
  # - name: "TGIF"
  #   master-server: "tgif.network:62031"
  #   password: "anotherpassword"
  #   callsign: KI5VMF
  #   radio-id: 319186803
  #   rx-freq: 429075000
  #   tx-freq: 424075000
  #   color-code: 7
  #   height: 3
  #   tg-rewrite:
  #     - from-slot: 2
  #       from-tg: 31665
  #       to-slot: 2
  #       to-tg: 31665
  #       range: 1

mmdvm-server:
  # Example of accepting an inbound MMDVM hotspot/client:
  # - name: "LocalHotspot"
  #   listen: ":62031"
  #   password: "anotherpassword"
  #   # Listener entries are only used to define the local server.
  #   # Connected MMDVM boxes self-register their own callsign, DMRID,
  #   # model and RF metadata, and the program stores them in SQLite.
  #   pass-all-tg: [1, 2]
