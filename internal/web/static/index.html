<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ipsc2mmdvm 管理台</title>
  <style>
    :root {
      --bg: #09111b;
      --panel: rgba(10, 24, 38, 0.88);
      --panel-2: rgba(13, 31, 48, 0.95);
      --border: rgba(131, 183, 219, 0.18);
      --text: #ecf7ff;
      --muted: #93adc0;
      --accent: #52d6ff;
      --accent-2: #59f0c2;
      --danger: #ff6d7c;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.32);
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(82, 214, 255, 0.35) rgba(255,255,255,0.04);
    }
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(82, 214, 255, 0.5), rgba(89, 240, 194, 0.42));
      border-radius: 999px;
      border: 2px solid rgba(9, 17, 27, 0.65);
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(82, 214, 255, 0.7), rgba(89, 240, 194, 0.6));
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(82, 214, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(89, 240, 194, 0.12), transparent 25%),
        linear-gradient(160deg, #071019, #0d1723 45%, #09111b);
      min-height: 100vh;
    }
    .shell { max-width: 1480px; margin: 0 auto; padding: 28px; }
    .hero {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero-main { padding: 28px; }
    .hero-side { padding: 24px; display: grid; gap: 14px; }
    h1, h2, h3 { margin: 0; font-weight: 700; }
    h1 { font-size: clamp(28px, 5vw, 48px); letter-spacing: -0.03em; }
    h2 { font-size: 20px; }
    p { color: var(--muted); margin: 0; }
    .sub { margin-top: 10px; max-width: 720px; line-height: 1.6; }
    .status { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px; color: var(--accent-2); font-size: 14px; }
    .pulse { width: 10px; height: 10px; background: var(--accent-2); border-radius: 50%; box-shadow: 0 0 0 0 rgba(89,240,194,.5); animation: pulse 1.8s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(89,240,194,.5); } 70% { box-shadow: 0 0 0 10px rgba(89,240,194,0); } 100% { box-shadow: 0 0 0 0 rgba(89,240,194,0); } }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-top: 22px; }
    .stat { padding: 14px; background: var(--panel-2); border-radius: 18px; border: 1px solid var(--border); min-width: 0; }
    .stat .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stat .value { font-size: 26px; font-weight: 700; }
    .layout { display: grid; grid-template-columns: 1fr; gap: 18px; }
    .section { padding: 22px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
    .tab-btn {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      cursor: pointer;
      font-weight: 700;
    }
    .tab-btn.active {
      color: #02131b;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .toolbar.compact { justify-content: flex-end; }
    .toolbar input, .editor textarea, .editor input {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }
    .toolbar input { max-width: 320px; }
    .toolbar-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .toggle input { width: auto; margin: 0; }
    .device-table-wrap { overflow-x: auto; border-radius: 18px; }
    table { width: 100%; min-width: 1220px; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,.06); vertical-align: top; white-space: nowrap; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    td { font-size: 14px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    .online { background: rgba(89,240,194,.12); color: var(--accent-2); }
    .offline { background: rgba(255,255,255,.08); color: var(--muted); }
    .cat { background: rgba(82,214,255,.12); color: var(--accent); }
    .call-list { display: grid; gap: 8px; max-height: 420px; overflow: auto; }
    .call-item {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.02);
      overflow-x: auto;
      overflow-y: hidden;
    }
    .call-line {
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-width: max-content;
      white-space: nowrap;
    }
    .call-line > * { flex: 0 0 auto; }
    .call-field {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 8px 12px;
      min-width: 96px;
      border-radius: 14px;
      border: 1px solid rgba(131, 183, 219, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .call-field strong {
      display: none;
    }
    .call-field span {
      color: var(--text);
      font-size: 14px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .field-name { min-width: 180px; }
    .field-state { min-width: 92px; }
    .field-time { min-width: 120px; }
    .field-route { min-width: 92px; }
    .field-id { min-width: 108px; }
    .field-net { min-width: 150px; }
    .field-duration { min-width: 6ch; }
    .field-callsign { min-width: 9ch; max-width: 12ch; }
    .field-slot { min-width: 56px; }
    .field-name { border-color: rgba(82,214,255,.22); background: linear-gradient(180deg, rgba(82,214,255,.16), rgba(82,214,255,.06)); }
    .field-state {
      border-color: rgba(89,240,194,.22);
      background: linear-gradient(180deg, rgba(89,240,194,.18), rgba(89,240,194,.05));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .field-time { border-color: rgba(255,204,107,.22); background: linear-gradient(180deg, rgba(255,204,107,.14), rgba(255,204,107,.05)); }
    .field-route { border-color: rgba(154,133,255,.22); background: linear-gradient(180deg, rgba(154,133,255,.16), rgba(154,133,255,.05)); }
    .field-id { border-color: rgba(255,122,162,.22); background: linear-gradient(180deg, rgba(255,122,162,.14), rgba(255,122,162,.05)); }
    .field-net { border-color: rgba(110,226,255,.22); background: linear-gradient(180deg, rgba(110,226,255,.14), rgba(110,226,255,.05)); }
    .meta { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .call-main {
      flex: 0 0 auto;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .active-calls {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(89,240,194,.28);
      background: linear-gradient(135deg, rgba(89,240,194,.08), rgba(82,214,255,.04));
      box-shadow: inset 0 0 0 1px rgba(89,240,194,.06);
    }
    .active-calls:empty {
      display: none;
    }
    .active-calls-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .active-calls-title {
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent-2);
    }
    .active-calls-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(89,240,194,.16);
      border: 1px solid rgba(89,240,194,.28);
      color: var(--accent-2);
      font-weight: 700;
      font-size: 13px;
    }
    .active-call-item {
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 204, 107, .42);
      background: linear-gradient(135deg, rgba(255,204,107,.22), rgba(255,122,162,.14));
      box-shadow: inset 0 0 0 1px rgba(255,204,107,.12), 0 16px 36px rgba(0,0,0,.22);
      overflow-x: auto;
      overflow-y: hidden;
    }
    .active-title { display: flex; align-items: center; gap: 10px; }
    .active-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 0 rgba(89,240,194,.45);
      animation: pulse 1.8s infinite;
    }
    .voice-wave {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 18px;
    }
    .voice-wave i {
      display: block;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff3b8, #ff7aa2);
      animation: wave 1.1s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .voice-wave i:nth-child(1) { height: 8px; animation-delay: 0s; }
    .voice-wave i:nth-child(2) { height: 15px; animation-delay: .16s; }
    .voice-wave i:nth-child(3) { height: 11px; animation-delay: .3s; }
    .voice-wave i:nth-child(4) { height: 17px; animation-delay: .44s; }
    .voice-wave i:nth-child(5) { height: 10px; animation-delay: .58s; }
    .call-item.ended-call {
      border-color: rgba(255,204,107,.16);
      background: rgba(255,255,255,.02);
    }
    .toast-stack {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 70;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 36px));
      pointer-events: none;
    }
    .toast {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,204,107,.32);
      background: linear-gradient(135deg, rgba(255,204,107,.16), rgba(255,122,162,.14));
      box-shadow: 0 16px 36px rgba(0,0,0,.2);
      color: var(--text);
    }
    .toast-title {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fff3b8;
      margin-bottom: 4px;
    }
    .toast-body {
      font-size: 14px;
      font-weight: 700;
    }
    .info-grid { display: grid; gap: 12px; }
    .info-block {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
    }
    .info-block h2 { font-size: 16px; margin-bottom: 8px; }
    .info-list { display: grid; gap: 6px; }
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .info-row strong {
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }
    .info-row span:last-child {
      color: var(--text);
      text-align: right;
      word-break: break-all;
    }
    .editor { display: grid; gap: 10px; margin-top: 18px; }
    .group-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .group-box {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
    }
    .editor-status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .editor-status.ok { color: var(--accent-2); }
    .editor-status.err { color: #ff9ab8; }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .danger {
      border-color: rgba(255, 122, 162, .35);
      background: linear-gradient(180deg, rgba(255,122,162,.18), rgba(255,122,162,.06));
      color: #ffd7e5;
    }
    .group-box h4 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .group-chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; }
    .group-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--text);
    }
    .group-chip.dynamic { border-color: rgba(89,240,194,.28); color: var(--accent-2); }
    .group-summary {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      max-width: 220px;
      white-space: normal;
    }
    .group-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      border: 1px solid rgba(131, 183, 219, 0.18);
      background: rgba(255,255,255,.04);
      color: var(--text);
    }
    .group-pill.dynamic {
      border-color: rgba(89,240,194,.26);
      color: var(--accent-2);
    }
    .action-btn {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1;
    }
    .editor-actions { display: flex; gap: 10px; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4, 10, 16, 0.72);
      backdrop-filter: blur(10px);
      z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10, 24, 38, 0.96), rgba(13, 31, 48, 0.96));
      box-shadow: var(--shadow);
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-head p { font-size: 13px; }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      color: #02131b;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary { background: rgba(255,255,255,.08); color: var(--text); }
    .empty { padding: 28px 14px; color: var(--muted); text-align: center; }
    .selected { outline: 1px solid rgba(82,214,255,.45); background: rgba(82,214,255,.06); }
    @media (max-width: 1100px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 700px) {
      .shell { padding: 16px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      table { min-width: 980px; }
      .field-name { min-width: 160px; }
      .field-time { min-width: 110px; }
      .field-net { min-width: 132px; }
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(.55); opacity: .55; }
      50% { transform: scaleY(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="toast-stack" class="toast-stack"></div>
  <div class="shell">
    <section class="hero">
      <div class="card hero-main">
        <div class="status"><span class="pulse"></span><span id="ws-status">实时链路已连接</span></div>
        <h1>中继台与盒子统一管理台</h1>
        <p class="sub">实时查看 Moto、海能达和 MMDVM 盒子的在线状态、注册信息、最近呼叫和历史记录。</p>
        <div class="stats">
          <div class="stat"><div class="label">总设备数</div><div id="total-devices" class="value">0</div></div>
          <div class="stat"><div class="label">在线设备</div><div id="online-devices" class="value">0</div></div>
          <div class="stat"><div class="label">最近呼叫</div><div id="call-count" class="value">0</div></div>
          <div class="stat"><div class="label">当前呼叫</div><div id="active-call-count" class="value">0</div></div>
          <div class="stat"><div class="label">MMDVM 在线</div><div id="mmdvm-online" class="value">0</div></div>
        </div>
      </div>
      <div class="card hero-side">
        <div id="runtime-info" class="info-grid"></div>
      </div>
    </section>

    <section class="card section">
      <div class="tabs">
        <button id="tab-calls" class="tab-btn active" type="button">呼叫列表</button>
        <button id="tab-devices" class="tab-btn" type="button">设备列表</button>
      </div>

      <div id="panel-calls" class="tab-panel active">
        <div class="toolbar compact">
          <span class="badge cat">缓存最近 50 条</span>
        </div>
        <div id="active-calls" class="active-calls"></div>
        <div id="calls" class="call-list"></div>
      </div>

      <div id="panel-devices" class="tab-panel">
        <div class="toolbar">
          <input id="search" placeholder="搜索呼号 / DMRID / IP / 型号 / 类别">
          <div class="toolbar-actions">
            <label class="toggle"><input id="toggle-device-details" type="checkbox">显示型号 / IP端口 / 位置</label>
          </div>
        </div>
        <div id="device-wrap"></div>
      </div>
    </section>
  </div>

  <div id="device-modal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="modal-title">设备管理</h3>
          <p id="modal-subtitle">编辑设备名称、备注和静态组</p>
        </div>
        <button id="close-modal" type="button" class="secondary">关闭</button>
      </div>
      <div class="editor">
        <input id="edit-name" placeholder="显示名称">
        <input id="edit-dmrid" inputmode="numeric" placeholder="设备 DMRID">
        <textarea id="edit-notes" rows="4" placeholder="备注"></textarea>
        <input id="edit-static-slot1" placeholder="TS1 静态组，逗号分隔">
        <input id="edit-static-slot2" placeholder="TS2 静态组，逗号分隔">
        <div class="group-grid">
          <div class="group-box">
            <h4>TS1 当前订阅</h4>
            <div id="group-view-slot1" class="group-chip-wrap"></div>
          </div>
          <div class="group-box">
            <h4>TS2 当前订阅</h4>
            <div id="group-view-slot2" class="group-chip-wrap"></div>
          </div>
        </div>
        <div id="editor-status" class="editor-status"></div>
        <label style="color:var(--muted); font-size:14px;"><input id="edit-disabled" type="checkbox" style="width:auto; margin-right:8px;">标记为禁用</label>
        <div class="editor-actions">
          <button id="save-device">保存</button>
          <button id="clear-device" class="secondary">清空选择</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = { devices: [], calls: [], groups: {}, selectedId: null, runtime: null, editorDirty: false, showDeviceDetails: false };
    let snapshotRefreshTimer = null;
    const activeNotifications = new Set();
    const el = (id) => document.getElementById(id);

    function fmtTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
    }

    function isZeroTime(value) {
      return !value || value === "0001-01-01T00:00:00Z" || value.startsWith("0001-01-01T00:00:00");
    }

    function isActiveCall(call) {
      return isZeroTime(call?.endedAt);
    }

    function fmtDuration(call) {
      if (isZeroTime(call.endedAt)) return "-";
      const start = call.createdAt ? new Date(call.createdAt).getTime() : 0;
      if (!start) return "-";
      const ended = isZeroTime(call.endedAt) ? 0 : new Date(call.endedAt).getTime();
      const end = ended || (call.durationMs > 0 ? start + call.durationMs : Date.now());
      const total = Math.max(0, Math.floor((end - start) / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function byId(id) {
      return state.devices.find((item) => item.id === id);
    }

    function deviceGroups(sourceKey) {
      return state.groups[sourceKey] || { slots: { "1": [], "2": [] } };
    }

    function groupsFor(sourceKey, slot, kind = "") {
      const slots = deviceGroups(sourceKey).slots || {};
      const groups = slots[String(slot)] || slots[slot] || [];
      return kind ? groups.filter((item) => item.kind === kind) : groups;
    }

    function formatGroupInput(sourceKey, slot) {
      return groupsFor(sourceKey, slot, "static").map((item) => item.groupId).join(",");
    }

    function renderGroupChips(targetId, groups) {
      if (!groups.length) {
        el(targetId).innerHTML = '<span class="meta">无</span>';
        return;
      }
      el(targetId).innerHTML = groups.map((item) =>
        `<span class="group-chip ${item.kind === "dynamic" ? "dynamic" : ""}">${item.groupId}${item.kind === "dynamic" ? " D" : " S"}</span>`
      ).join("");
    }

    function parseGroupInput(value) {
      const seen = new Set();
      return value.split(/[,\s]+/)
        .map((item) => item.trim())
        .filter(Boolean)
        .map((item) => Number.parseInt(item, 10))
        .filter((item) => Number.isFinite(item) && item > 0 && !seen.has(item) && seen.add(item));
    }

    function parseOptionalUint(value) {
      const trimmed = (value || "").trim();
      if (!trimmed) return 0;
      const parsed = Number.parseInt(trimmed, 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    }

    function renderGroupSummary(sourceKey, slot) {
      const groups = groupsFor(sourceKey, slot);
      if (!groups.length) return "-";
      return `<div class="group-summary">${groups.map((item) =>
        `<span class="group-pill ${item.kind === "dynamic" ? "dynamic" : ""}">${item.groupId}${item.kind === "dynamic" ? "D" : "S"}</span>`
      ).join("")}</div>`;
    }

    function fmtList(values, emptyText = "-") {
      return values && values.length ? values.join(" , ") : emptyText;
    }

    function renderRuntime() {
      const runtime = state.runtime || {};
      const rows = [
        { label: "当前访问地址", value: runtime.accessUrl || location.origin || "-" },
        { label: "IPSC UDP", value: runtime.ipscListen || "-" },
        { label: "Hytera P2P", value: runtime.hyteraP2pListen || "-" },
        { label: "Hytera DMR", value: runtime.hyteraDmrListen || "-" },
        { label: "Hytera RDAC", value: runtime.hyteraRdacListen || "-" },
        { label: "MMDVM 侦听", value: fmtList(runtime.mmdvmServerListen) },
        { label: "MMDVM 上游", value: fmtList(runtime.mmdvmClientMasters) },
      ];
      el("runtime-info").innerHTML = `
        <section class="info-block">
          <h2>接入信息</h2>
          <div class="info-list">
            ${rows.map((row) => `<div class="info-row"><strong>${row.label}</strong><span>${row.value}</span></div>`).join("")}
          </div>
        </section>`;
    }

    function setTab(name) {
      const callsActive = name === "calls";
      el("tab-calls").classList.toggle("active", callsActive);
      el("tab-devices").classList.toggle("active", !callsActive);
      el("panel-calls").classList.toggle("active", callsActive);
      el("panel-devices").classList.toggle("active", !callsActive);
    }

    function renderStats() {
      const online = state.devices.filter((d) => d.online);
      const activeCalls = state.calls.filter((call) => isActiveCall(call));
      el("total-devices").textContent = state.devices.length;
      el("online-devices").textContent = online.length;
      el("call-count").textContent = state.calls.length;
      el("active-call-count").textContent = activeCalls.length;
      el("mmdvm-online").textContent = online.filter((d) => d.category === "mmdvm").length;
    }

    function renderDevices() {
      const q = el("search").value.trim().toLowerCase();
      const showDetails = state.showDeviceDetails;
      const devices = state.devices
        .slice()
        .filter((d) => !q || [d.name, d.callsign, d.dmrid, d.ip, d.model, d.category, d.protocol, d.location].join(" ").toLowerCase().includes(q))
        .sort((a, b) => Number(b.id || 0) - Number(a.id || 0));

      if (!devices.length) {
        el("device-wrap").innerHTML = '<div class="empty">没有匹配的设备</div>';
        return;
      }

      const rows = devices.map((d) => `
        <tr data-id="${d.id}" class="${state.selectedId === d.id ? "selected" : ""}">
          <td><strong>${d.name || d.callsign || d.sourceKey}</strong><div class="meta">${d.notes || "-"}</div></td>
          <td><span class="badge ${d.online ? "online" : "offline"}">${d.online ? "在线" : "离线"}</span></td>
          <td><span class="badge cat">${d.category}</span></td>
          <td>${d.callsign || "-"}</td>
          <td>${d.dmrid || "-"}</td>
          <td>${renderGroupSummary(d.sourceKey, 1)}</td>
          <td>${renderGroupSummary(d.sourceKey, 2)}</td>
          ${showDetails ? `<td>${d.model || "-"}</td>` : ""}
          ${showDetails ? `<td>${d.ip || "-"}${d.port ? ":" + d.port : ""}</td>` : ""}
          <td>${d.protocol || "-"}</td>
          ${showDetails ? `<td>${d.location || "-"}</td>` : ""}
          <td>${fmtTime(d.lastSeenAt)}</td>
          <td><div class="actions"><button type="button" class="action-btn" data-edit-id="${d.id}">编辑</button><button type="button" class="action-btn danger" data-delete-id="${d.id}">删除</button></div></td>
        </tr>`).join("");

      el("device-wrap").innerHTML = `
        <div class="device-table-wrap">
        <table>
          <thead>
            <tr>
              <th>设备</th><th>状态</th><th>类别</th><th>呼号</th><th>DMRID</th><th>TS1</th><th>TS2</th>${showDetails ? "<th>型号</th><th>IP/端口</th>" : ""}<th>协议</th>${showDetails ? "<th>位置</th>" : ""}<th>最后在线</th><th>操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        </div>`;

      el("device-wrap").querySelectorAll("button[data-edit-id]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          openDeviceModal(Number(button.dataset.editId));
        });
      });
      el("device-wrap").querySelectorAll("button[data-delete-id]").forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.stopPropagation();
          const id = Number(button.dataset.deleteId);
          const dev = byId(id);
          const label = dev?.name || dev?.callsign || dev?.sourceKey || `#${id}`;
          if (!confirm(`确认删除设备 ${label} ?`)) return;
          const resp = await fetch(`/api/devices/${id}`, { method: "DELETE" });
          if (!resp.ok) {
            alert("删除失败");
            return;
          }
          state.devices = state.devices.filter((item) => item.id !== id);
          delete state.groups[dev?.sourceKey || ""];
          if (state.selectedId === id) {
            state.selectedId = null;
            closeDeviceModal();
          }
          renderStats();
          renderDevices();
        });
      });
    }

    function renderCalls() {
      const calls = state.calls.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
      const activeCalls = calls.filter((call) => isActiveCall(call));
      const historyCalls = calls.filter((call) => !isActiveCall(call));
      if (!activeCalls.length) {
        el("active-calls").innerHTML = "";
      } else {
        el("active-calls").innerHTML = `
          <div class="active-calls-head">
            <div class="active-calls-title">当前进行中的呼叫</div>
            <div class="active-calls-count">${activeCalls.length}</div>
          </div>
        ` + activeCalls.map((call) => `
          <article class="active-call-item">
            <div class="call-line">
              ${renderCallField("设备", `
                <span class="active-title call-main"><span class="active-dot"></span><span>${call.sourceName || call.sourceCallsign || call.sourceKey || "未知设备"}</span><span class="voice-wave"><i></i><i></i><i></i><i></i><i></i></span></span>
              `, "field-name")}
              ${renderCallField("状态", `<span class="badge ${call.callType === "private" ? "offline" : "online"}">进行中</span>`, "field-state")}
              ${renderCallField("时间", fmtTime(call.createdAt), "field-time")}
              ${renderCallField("前端", call.frontend || "-", "field-route")}
              ${renderCallField("呼号", call.sourceCallsign || "-", "field-id field-callsign")}
              ${renderCallField("源 ID", call.srcId || "-", "field-id")}
              ${renderCallField("目标", call.dstId || "-", "field-id")}
              ${renderCallField("时隙", `TS${call.slot || "-"}`, "field-route field-slot")}
              ${renderCallField("流号", call.streamId || "-", "field-route")}
              ${renderCallField("地址", `${call.fromIp || "-"}${call.fromPort ? ":" + call.fromPort : ""}`, "field-net")}
            </div>
          </article>`).join("");
      }
      if (!historyCalls.length) {
        el("calls").innerHTML = '<div class="empty">暂无呼叫记录</div>';
        return;
      }
      el("calls").innerHTML = historyCalls.map((call) => `
        <article class="call-item ended-call">
          <div class="call-line">
            ${renderCallField("设备", call.sourceName || call.sourceCallsign || call.sourceKey || "未知设备", "field-name")}
            ${renderCallField("状态", `<span class="badge ${call.callType === "private" ? "offline" : "cat"}">${call.callType}</span>`, "field-state")}
            ${renderCallField("时间", fmtTime(call.createdAt), "field-time")}
            ${renderCallField("时长", fmtDuration(call), "field-time field-duration")}
            ${renderCallField("前端", call.frontend || "-", "field-route")}
            ${renderCallField("呼号", call.sourceCallsign || "-", "field-id field-callsign")}
            ${renderCallField("源 ID", call.srcId || "-", "field-id")}
            ${renderCallField("目标", call.dstId || "-", "field-id")}
            ${renderCallField("时隙", `TS${call.slot || "-"}`, "field-route field-slot")}
            ${renderCallField("流号", call.streamId || "-", "field-route")}
            ${renderCallField("地址", `${call.fromIp || "-"}${call.fromPort ? ":" + call.fromPort : ""}`, "field-net")}
          </div>
        </article>`).join("");
    }

    function renderCallField(label, value, cls = "") {
      return `<div class="call-field ${cls}"><strong>${label}</strong><span>${value}</span></div>`;
    }

    function fillDeviceEditor(id) {
      const dev = byId(id);
      el("modal-title").textContent = dev?.name || dev?.callsign || dev?.sourceKey || "设备管理";
      el("modal-subtitle").textContent = `${dev?.protocol || "-"} / ${dev?.ip || "-"}${dev?.port ? ":" + dev.port : ""}`;
      el("edit-name").value = dev?.name || "";
      el("edit-dmrid").value = dev?.dmrid ? String(dev.dmrid) : "";
      el("edit-notes").value = dev?.notes || "";
      el("edit-static-slot1").value = dev ? formatGroupInput(dev.sourceKey, 1) : "";
      el("edit-static-slot2").value = dev ? formatGroupInput(dev.sourceKey, 2) : "";
      renderGroupChips("group-view-slot1", dev ? groupsFor(dev.sourceKey, 1) : []);
      renderGroupChips("group-view-slot2", dev ? groupsFor(dev.sourceKey, 2) : []);
      el("edit-disabled").checked = Boolean(dev?.disabled);
    }

    function selectDevice(id) {
      state.selectedId = id;
      fillDeviceEditor(id);
      renderDevices();
    }

    function openDeviceModal(id) {
      state.editorDirty = false;
      el("editor-status").textContent = "";
      el("editor-status").className = "editor-status";
      selectDevice(id);
      el("device-modal").classList.add("open");
    }

    function closeDeviceModal() {
      state.editorDirty = false;
      el("editor-status").textContent = "";
      el("editor-status").className = "editor-status";
      el("device-modal").classList.remove("open");
    }

    function applySnapshot(snapshot) {
      state.devices = snapshot.devices || [];
      state.calls = snapshot.calls || [];
      state.groups = snapshot.groups || {};
      state.runtime = snapshot.runtime || null;
      renderRuntime();
      renderStats();
      renderDevices();
      renderCalls();
      if (state.selectedId && !state.editorDirty) fillDeviceEditor(state.selectedId);
    }

    function upsertDevice(device) {
      const idx = state.devices.findIndex((item) => item.id === device.id);
      if (idx >= 0) state.devices[idx] = device;
      else state.devices.push(device);
      if (state.selectedId === device.id && !state.editorDirty) fillDeviceEditor(device.id);
      renderStats();
      renderDevices();
    }

    function removeDevice(device) {
      state.devices = state.devices.filter((item) => item.id !== device.id);
      if (device?.sourceKey) delete state.groups[device.sourceKey];
      if (state.selectedId === device.id) {
        state.selectedId = null;
        closeDeviceModal();
      }
      renderStats();
      renderDevices();
    }

    function appendCall(call) {
      const isNewActive = isActiveCall(call) && !activeNotifications.has(call.id);
      const idx = call.id ? state.calls.findIndex((item) => item.id === call.id) : -1;
      if (idx >= 0) state.calls[idx] = call;
      else state.calls.push(call);
      if (!isActiveCall(call) && call.id) activeNotifications.delete(call.id);
      if (isNewActive && call.id) {
        activeNotifications.add(call.id);
        notifyCallStart(call);
      }
      state.calls = state.calls
        .slice()
        .sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""))
        .slice(0, 50);
      renderStats();
      renderCalls();
    }

    function notifyCallStart(call) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `
        <div class="toast-title">呼叫开始</div>
        <div class="toast-body">${call.sourceCallsign || call.sourceName || call.sourceKey || "未知设备"} -> ${call.dstId || "-"}</div>
      `;
      el("toast-stack").prepend(toast);
      setTimeout(() => toast.remove(), 4200);
    }

    async function loadSnapshot() {
      const resp = await fetch("/api/snapshot");
      applySnapshot(await resp.json());
    }

    function scheduleSnapshotRefresh(delay = 180) {
      if (snapshotRefreshTimer) clearTimeout(snapshotRefreshTimer);
      snapshotRefreshTimer = setTimeout(() => {
        snapshotRefreshTimer = null;
        loadSnapshot().catch(() => {});
      }, delay);
    }

    async function saveDevice() {
      if (!state.selectedId) return;
      const resp = await fetch(`/api/devices/${state.selectedId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: el("edit-name").value,
          dmrid: parseOptionalUint(el("edit-dmrid").value),
          notes: el("edit-notes").value,
          disabled: el("edit-disabled").checked,
          staticSlot1: parseGroupInput(el("edit-static-slot1").value),
          staticSlot2: parseGroupInput(el("edit-static-slot2").value),
        }),
      });
      if (!resp.ok) {
        el("editor-status").textContent = "保存失败";
        el("editor-status").className = "editor-status err";
        return;
      }
      state.editorDirty = false;
      upsertDevice(await resp.json());
      await loadSnapshot();
      if (state.selectedId) fillDeviceEditor(state.selectedId);
      el("editor-status").textContent = "已保存，静态组已生效";
      el("editor-status").className = "editor-status ok";
    }

    function connectWS() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen = () => { el("ws-status").textContent = "实时链路已连接"; };
      ws.onclose = () => {
        el("ws-status").textContent = "实时链路断开，正在重连";
        setTimeout(connectWS, 1200);
      };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "snapshot") applySnapshot(msg.snapshot);
        if (msg.type === "device_updated" && msg.device) upsertDevice(msg.device);
        if (msg.type === "device_deleted" && msg.device) removeDevice(msg.device);
        if (msg.type === "call_recorded" && msg.call) {
          appendCall(msg.call);
          scheduleSnapshotRefresh();
        }
      };
    }

    el("search").addEventListener("input", renderDevices);
    ["edit-name", "edit-dmrid", "edit-notes", "edit-static-slot1", "edit-static-slot2", "edit-disabled"].forEach((id) => {
      const eventName = id === "edit-disabled" ? "change" : "input";
      el(id).addEventListener(eventName, () => {
        state.editorDirty = true;
      });
    });
    el("tab-calls").addEventListener("click", () => setTab("calls"));
    el("tab-devices").addEventListener("click", () => setTab("devices"));
    el("toggle-device-details").addEventListener("change", (event) => {
      state.showDeviceDetails = event.target.checked;
      renderDevices();
    });
    el("save-device").addEventListener("click", saveDevice);
    el("clear-device").addEventListener("click", () => {
      state.selectedId = null;
      state.editorDirty = false;
      el("editor-status").textContent = "";
      el("editor-status").className = "editor-status";
      el("edit-name").value = "";
      el("edit-dmrid").value = "";
      el("edit-notes").value = "";
      el("edit-static-slot1").value = "";
      el("edit-static-slot2").value = "";
      renderGroupChips("group-view-slot1", []);
      renderGroupChips("group-view-slot2", []);
      el("edit-disabled").checked = false;
      closeDeviceModal();
      renderDevices();
    });
    el("close-modal").addEventListener("click", closeDeviceModal);
    el("device-modal").addEventListener("click", (event) => {
      if (event.target === el("device-modal")) closeDeviceModal();
    });

    loadSnapshot().then(connectWS).catch(() => connectWS());
    setInterval(renderCalls, 1000);
  </script>
</body>
</html>
